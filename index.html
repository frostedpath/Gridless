<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="GRIDLESS — Offline-first emergency mesh communication platform for internet blackouts and natural disasters.">
<title>GRIDLESS — Offline Emergency Mesh Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header id="app-header">
  <div class="logo" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg>
    <span class="logo-text">GRIDLESS</span>
  </div>
  <div class="status-pill">
    <span class="status-dot"></span>
    <span id="header-node-id">NODE-???</span>
  </div>
</header>
<main id="view-container">
  <section id="view-dashboard" class="view active" style="display:block; opacity:1; transform:translateY(0)">

    <div class="section-title">System Overview</div>
    <div class="dash-grid">
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <div class="stat-value" id="dash-nodes">0</div>
        <div class="stat-label">Active Nodes</div>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 12S5 5 12 5s10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <div class="stat-value" id="dash-signal">0%</div>
        <div class="stat-label">Signal Health</div>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <div class="stat-value" id="dash-packets">0</div>
        <div class="stat-label">Packets Relayed</div>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        <div class="uptime-display" id="dash-uptime">00:00:00</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Signal Waveform</span>
        <span style="font-size:0.65rem;color:var(--text-dim)" id="dash-last-broadcast">Last broadcast: --</span>
      </div>
      <div class="waveform-container">
        <canvas id="waveform-canvas"></canvas>
      </div>
    </div>

    <div class="section-title">Quick Actions</div>
    <div class="quick-actions">
      <button class="action-btn" onclick="window.location.href='broadcast.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.07 4.93A10 10 0 0 1 4.93 19.07M15.54 8.46A5 5 0 0 1 8.46 15.54"/><circle cx="12" cy="12" r="1"/></svg>
        VIEW BROADCASTS
      </button>
      <button class="action-btn" onclick="window.location.href='mesh.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><line x1="5" y1="8" x2="12" y2="16"/><line x1="19" y1="8" x2="12" y2="16"/><line x1="7" y1="6" x2="17" y2="6"/></svg>
        MESH MAP
      </button>
      <button class="action-btn" onclick="window.location.href='chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        LOCAL CHAT
      </button>
      <button class="action-btn danger" onclick="window.location.href='sos.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        SOS BEACON
      </button>
    </div>
  
  </section>
</main>
<nav id="bottom-nav">
  <button class="nav-btn active" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    DASH
  </button>
  <button class="nav-btn " onclick="window.location.href='mesh.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><line x1="5" y1="8" x2="5" y2="16"/><line x1="19" y1="8" x2="19" y2="16"/><line x1="7" y1="6" x2="17" y2="6"/><line x1="7" y1="18" x2="17" y2="18"/><line x1="7" y1="7" x2="17" y2="17"/></svg>
    MESH
  </button>
  <button class="nav-btn " onclick="window.location.href='broadcast.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19.07 4.93A10 10 0 0 1 4.93 19.07"/><path d="M15.54 8.46A5 5 0 0 1 8.46 15.54"/><circle cx="12" cy="12" r="1.5"/></svg>
    ALERTS
  </button>
  <button class="nav-btn " onclick="window.location.href='chat.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    CHAT
  </button>
  <button class="nav-btn sos-nav " onclick="window.location.href='sos.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    SOS
  </button>
</nav>
<script src="js/core.js"></script>
<script src="js/mesh-sim.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
